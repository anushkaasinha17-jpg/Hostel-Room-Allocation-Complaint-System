<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="900" height="500" fill="#0a0a12"/>
  <text x="450" y="36" text-anchor="middle" fill="#e8ff47" font-size="18" font-weight="bold">DFD Level 0 — Context Diagram</text>
  <text x="450" y="58" text-anchor="middle" fill="#555" font-size="12">Hostel Room Allocation &amp; Complaint System</text>

  <!-- Central Process -->
  <circle cx="450" cy="270" r="100" fill="#12121e" stroke="#e8ff47" stroke-width="2.5"/>
  <text x="450" y="260" text-anchor="middle" fill="#e8ff47" font-size="13" font-weight="bold">HostelHub</text>
  <text x="450" y="278" text-anchor="middle" fill="#e8ff47" font-size="13" font-weight="bold">System</text>
  <text x="450" y="296" text-anchor="middle" fill="#888" font-size="11">Process 0</text>

  <!-- External Entities (squares) -->
  <!-- Student -->
  <rect x="40" y="100" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#7c6af7" stroke-width="2"/>
  <text x="100" y="131" text-anchor="middle" fill="#a99ef5" font-size="13" font-weight="bold">Student</text>

  <!-- Warden -->
  <rect x="40" y="330" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="100" y="361" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Warden</text>

  <!-- Admin -->
  <rect x="740" y="100" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#f87171" stroke-width="2"/>
  <text x="800" y="131" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Admin</text>

  <!-- Maintenance Staff -->
  <rect x="740" y="330" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="2"/>
  <text x="810" y="361" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Maint. Staff</text>

  <!-- Arrows: Student ↔ System -->
  <line x1="160" y1="120" x2="352" y2="230" stroke="#7c6af7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="162" fill="#7c6af7" font-size="10" transform="rotate(-30 240 162)">Room application, complaint</text>
  <line x1="352" y1="250" x2="160" y2="140" stroke="#7c6af7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="210" y="215" fill="#7c6af7" font-size="10" transform="rotate(-30 210 215)">Allocation notice, status</text>

  <!-- Arrows: Warden ↔ System -->
  <line x1="160" y1="350" x2="352" y2="310" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="230" y="348" fill="#fbbf24" font-size="10">Approve / Reject</text>
  <line x1="352" y1="330" x2="160" y2="370" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="220" y="370" fill="#fbbf24" font-size="10">Complaint list, alerts</text>

  <!-- Arrows: Admin ↔ System -->
  <line x1="740" y1="120" x2="548" y2="230" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="640" y="162" fill="#f87171" font-size="10" transform="rotate(30 640 162)">Configuration, user mgmt</text>
  <line x1="548" y1="250" x2="740" y2="140" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="640" y="210" fill="#f87171" font-size="10" transform="rotate(30 640 210)">Reports, analytics</text>

  <!-- Arrows: Staff ↔ System -->
  <line x1="740" y1="350" x2="548" y2="310" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="630" y="340" fill="#60a5fa" font-size="10">Status update</text>
  <line x1="548" y1="330" x2="740" y2="370" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="620" y="375" fill="#60a5fa" font-size="10">Task assignment</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="350" y="430" width="200" height="55" rx="8" fill="#12121e" stroke="#252538"/>
  <text x="450" y="450" text-anchor="middle" fill="#888" font-size="11">Legend</text>
  <line x1="366" y1="465" x2="396" y2="465" stroke="#aaa" stroke-width="1.5"/>
  <text x="404" y="470" fill="#aaa" font-size="10">Data flow (in)</text>
  <line x1="366" y1="478" x2="396" y2="478" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="404" y="483" fill="#aaa" font-size="10">Data flow (out)</text>
</svg>
