<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="900" height="640" fill="#0a0a12"/>
  <text x="450" y="36" text-anchor="middle" fill="#e8ff47" font-size="18" font-weight="bold">Use Case Diagram — Hostel Room Allocation &amp; Complaint System</text>

  <!-- System Boundary -->
  <rect x="180" y="55" width="560" height="560" rx="14" fill="none" stroke="#252538" stroke-width="2"/>
  <text x="460" y="75" text-anchor="middle" fill="#555" font-size="13">HostelHub System</text>

  <!-- Use Cases - Room Allocation -->
  <ellipse cx="460" cy="120" rx="90" ry="24" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="460" y="125" text-anchor="middle" fill="#a99ef5" font-size="12">Apply for Room</text>

  <ellipse cx="460" cy="185" rx="90" ry="24" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="460" y="190" text-anchor="middle" fill="#a99ef5" font-size="12">View Room Status</text>

  <ellipse cx="460" cy="250" rx="90" ry="24" fill="#1a1a2e" stroke="#e8ff47" stroke-width="1.5"/>
  <text x="460" y="255" text-anchor="middle" fill="#e8ff47" font-size="12">Approve Allocation</text>

  <ellipse cx="460" cy="315" rx="90" ry="24" fill="#1a1a2e" stroke="#f87171" stroke-width="1.5"/>
  <text x="460" y="320" text-anchor="middle" fill="#f87171" font-size="12">File Complaint</text>

  <ellipse cx="460" cy="380" rx="90" ry="24" fill="#1a1a2e" stroke="#f87171" stroke-width="1.5"/>
  <text x="460" y="385" text-anchor="middle" fill="#f87171" font-size="12">Track Complaint</text>

  <ellipse cx="460" cy="445" rx="90" ry="24" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="460" y="450" text-anchor="middle" fill="#4ade80" font-size="12">Assign Staff</text>

  <ellipse cx="460" cy="510" rx="90" ry="24" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="460" y="515" text-anchor="middle" fill="#60a5fa" font-size="12">Update Repair Status</text>

  <ellipse cx="460" cy="570" rx="90" ry="24" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="460" y="575" text-anchor="middle" fill="#fbbf24" font-size="12">View Analytics</text>

  <!-- ACTORS -->
  <!-- Student -->
  <circle cx="80" cy="120" r="18" fill="none" stroke="#7c6af7" stroke-width="2"/>
  <line x1="80" y1="138" x2="80" y2="175" stroke="#7c6af7" stroke-width="2"/>
  <line x1="55" y1="152" x2="105" y2="152" stroke="#7c6af7" stroke-width="2"/>
  <line x1="80" y1="175" x2="60" y2="200" stroke="#7c6af7" stroke-width="2"/>
  <line x1="80" y1="175" x2="100" y2="200" stroke="#7c6af7" stroke-width="2"/>
  <text x="80" y="218" text-anchor="middle" fill="#a99ef5" font-size="13" font-weight="bold">Student</text>

  <!-- Warden -->
  <circle cx="80" cy="310" r="18" fill="none" stroke="#e8ff47" stroke-width="2"/>
  <line x1="80" y1="328" x2="80" y2="365" stroke="#e8ff47" stroke-width="2"/>
  <line x1="55" y1="342" x2="105" y2="342" stroke="#e8ff47" stroke-width="2"/>
  <line x1="80" y1="365" x2="60" y2="390" stroke="#e8ff47" stroke-width="2"/>
  <line x1="80" y1="365" x2="100" y2="390" stroke="#e8ff47" stroke-width="2"/>
  <text x="80" y="408" text-anchor="middle" fill="#e8ff47" font-size="13" font-weight="bold">Warden</text>

  <!-- Maintenance Staff -->
  <circle cx="820" cy="480" r="18" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <line x1="820" y1="498" x2="820" y2="535" stroke="#60a5fa" stroke-width="2"/>
  <line x1="795" y1="512" x2="845" y2="512" stroke="#60a5fa" stroke-width="2"/>
  <line x1="820" y1="535" x2="800" y2="560" stroke="#60a5fa" stroke-width="2"/>
  <line x1="820" y1="535" x2="840" y2="560" stroke="#60a5fa" stroke-width="2"/>
  <text x="820" y="578" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Maint. Staff</text>

  <!-- Admin -->
  <circle cx="820" cy="570" r="0"/>
  <circle cx="820" cy="180" r="18" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <line x1="820" y1="198" x2="820" y2="235" stroke="#fbbf24" stroke-width="2"/>
  <line x1="795" y1="212" x2="845" y2="212" stroke="#fbbf24" stroke-width="2"/>
  <line x1="820" y1="235" x2="800" y2="260" stroke="#fbbf24" stroke-width="2"/>
  <line x1="820" y1="235" x2="840" y2="260" stroke="#fbbf24" stroke-width="2"/>
  <text x="820" y="278" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Admin</text>

  <!-- Lines: Student → Use Cases -->
  <line x1="98" y1="115" x2="370" y2="120" stroke="#7c6af7" stroke-width="1.2"/>
  <line x1="98" y1="125" x2="370" y2="185" stroke="#7c6af7" stroke-width="1.2"/>
  <line x1="98" y1="130" x2="370" y2="315" stroke="#7c6af7" stroke-width="1.2"/>
  <line x1="98" y1="132" x2="370" y2="380" stroke="#7c6af7" stroke-width="1.2"/>

  <!-- Lines: Warden → Use Cases -->
  <line x1="98" y1="305" x2="370" y2="250" stroke="#e8ff47" stroke-width="1.2"/>
  <line x1="98" y1="315" x2="370" y2="315" stroke="#e8ff47" stroke-width="1.2"/>
  <line x1="98" y1="325" x2="370" y2="380" stroke="#e8ff47" stroke-width="1.2"/>
  <line x1="98" y1="330" x2="370" y2="445" stroke="#e8ff47" stroke-width="1.2"/>

  <!-- Lines: Staff → Use Cases -->
  <line x1="802" y1="475" x2="550" y2="445" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="802" y1="485" x2="550" y2="510" stroke="#60a5fa" stroke-width="1.2"/>

  <!-- Lines: Admin → Use Cases -->
  <line x1="802" y1="175" x2="550" y2="120" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="802" y1="185" x2="550" y2="250" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="802" y1="190" x2="550" y2="570" stroke="#fbbf24" stroke-width="1.2"/>

  <!-- Legend -->
  <ellipse cx="680" cy="100" rx="30" ry="12" fill="none" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="720" y="105" fill="#aaa" font-size="10">Student UC</text>
  <ellipse cx="680" cy="125" rx="30" ry="12" fill="none" stroke="#e8ff47" stroke-width="1.5"/>
  <text x="720" y="130" fill="#aaa" font-size="10">Warden UC</text>
</svg>
